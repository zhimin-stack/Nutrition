      [227, 1, "在設計體重管理與代謝調節的機能性食品時,若要穩定內分泌與血糖,常會選擇添加哪一種微量礦物質作為輔助配方?", "氟", "鉻", "碘", "銅"],
      [228, 0, "關於水溶性維生素與礦物質的流失,洗腎(血液透析)病患在透析過程中容易流失下列何種營養素,因而常需額外補充?", "水溶性維生素B群與維生素C", "脂溶性維生素A、E", "飽和脂肪酸", "膽固醇"],

      [230, 1, "台灣早期因飲用水中缺乏何種微量礦物質,導致兒童容易發生蛀牙現象?", "鐵", "氟", "鋅", "鎂"],
      [231, 0, "在開發針對銀髮族的保健飲品時,考量到他們胃酸分泌減少,為提高「鈣」的吸收率,常選用哪一種鈣源較不受胃酸影響?", "檸檬酸鈣", "碳酸鈣", "磷酸鈣", "氫氧化鈣"],
      [232, 2, "新生兒的體內水分比例相較於成年人有何特徵?", "比例極低(約30%)", "比例與成人相同(約60%)", "比例極高(可達80%)", "完全不含水分"],
      [233, 1, "為了預防心血管疾病,「得舒飲食(DASH Diet)」強調攝取富含哪些礦物質的食物來幫助控制血壓?", "高鈉、低鉀", "高鉀、高鎂、高鈣", "高鐵、高鋅", "低鈣、低磷"],
      [234, 2, "若欲將保健食品宣稱具有「骨質保健」功能,法規要求其配方主要必須證明能改善或維持何種礦物質的恆定?", "鐵", "鋅", "鈣", "鉀"],
      [235, 1, "食品加工中若過度依賴精製穀物(如只吃白米、白麵粉),容易導致何種存在於全穀物麩皮與胚芽中的微量礦物質及維生素缺乏?", "維生素C與鈣", "維生素B群與鎂、鋅", "維生素A與脂肪", "維生素D與鈉"],
      [236, 3, "在銀髮族的長期照護中,為避免脫水,水分補充至關重要。關於人體缺乏水分(脫水)的初期生理反應,下列何者正確?", "血壓異常升高", "尿液顏色變淡、尿量增加", "血糖快速下降", "刺激口渴中樞,尿液變濃、尿量減少"],
      [237, 2, "在檢驗食品中礦物質含量時,利用高效液相層析儀(HPLC)或原子吸收光譜儀(AAS),主要是為了精確測出下列何者?", "膳食纖維", "總熱量", "溶液中特定金屬離子的濃度(如重金屬或微量元素)", "脂肪酸比例"],
      [238, 0, "針對兒童的生長發育,骨骼的延長與變粗極度依賴兩種巨量礦物質的沉積,分別為何?", "鈣與磷", "鈉與氯", "鐵與碘", "銅與鋅"],
      [239, 1, "當人體攝取過量的「鈉」時,腎臟會透過排出尿液來排除多餘的鈉,但此過程同時會帶走哪一種重要的骨骼礦物質,增加流失風險?", "鐵", "鈣", "銅", "硒"],
      [240, 1, "生命期營養學指出,人類在哪一個年齡階段能達到「巔峰骨量(Peak Bone Mass)」,因此在此之前補足鈣質與運動對預防老年骨質疏鬆最為關鍵?", "嬰幼兒期", "青春期至30歲左右", "40至50歲", "65歲以上"]
    ];

    const rawQuestions = rawData.map(d => ({
      id: d[0],
      ans: d[1],
      q: d[2],
      opts: [d[3], d[4], d[5], d[6]]
    }));

    // === 主程式 ===
    function App() {
      const [mode, setMode] = useState('menu');
      const [quizConfig, setQuizConfig] = useState({ title: '', questions: [] });
      const [currentIndex, setCurrentIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [wrongAnswers, setWrongAnswers] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);
      const [isAnswered, setIsAnswered] = useState(false);

      const startQuiz = (type) => {
        let filtered = [];
        let title = '';
        const safeSlice = (start, end) => rawQuestions.filter(q => q.id >= start && q.id <= end);

        switch(type) {
          case '1-80':
            filtered = safeSlice(1, 80);
            title = '順序刷題: 第 1 - 80 題 (醣類、脂質與蛋白質基礎)';
            break;
          case '81-160':
            filtered = safeSlice(81, 160);
            title = '順序刷題: 第 81 - 160 題 (維生素、臨床營養與加工)';
            break;
          case '161-240':
            filtered = safeSlice(161, 240);
            title = '順序刷題: 第 161 - 240 題 (礦物質、生命期營養學)';
            break;
          case 'rand80':
            filtered = [...rawQuestions].sort(() => 0.5 - Math.random()).slice(0, 80);
            title = '隨機抽題: 80 題 (隨機綜合精華)';
            break;
          case 'rand240':
            filtered = [...rawQuestions].sort(() => 0.5 - Math.random());
            title = '綜合隨機: 240 題 (完美極限考驗)';
            break;
          default:
            break;
        }

        setQuizConfig({ title, questions: filtered });
        setCurrentIndex(0);
        setScore(0);
        setWrongAnswers([]);
        setSelectedOption(null);
        setIsAnswered(false);
        setMode('quiz');
      };

      const handleOptionClick = (idx) => {
        if (isAnswered) return;
        
        setSelectedOption(idx);
        setIsAnswered(true);

        const currentQ = quizConfig.questions[currentIndex];
        if (idx === currentQ.ans) {
          setScore(prev => prev + 1);
        } else {
          setWrongAnswers(prev => [...prev, { q: currentQ, selected: idx }]);
        }
      };

      const handleNextQuestion = () => {
        if (currentIndex + 1 < quizConfig.questions.length) {
          setCurrentIndex(prev => prev + 1);
          setSelectedOption(null);
          setIsAnswered(false);
        } else {
          setMode('result');
        }
      };

      if (mode === 'menu') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50/50 flex items-center justify-center p-4 font-sans antialiased">
            <div className="bg-white rounded-3xl shadow-xl w-full max-w-md p-8 border border-slate-100">
              <div className="text-center mb-8">
                <div className="bg-gradient-to-tr from-blue-500 to-indigo-600 text-white w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-md shadow-blue-500/20 transform hover:scale-105 transition-transform duration-300">
                  <BookOpen size={32} />
                </div>
                <h1 className="text-2xl font-black text-slate-800 tracking-tight">營養學綜合考題</h1>
                <p className="text-slate-500 mt-2 text-sm font-medium">已載入完整 240 題題庫 • 支援智能錯題複習</p>
              </div>
              
              <div className="space-y-3">
                <div className="text-xs font-bold text-slate-400 tracking-wider mb-2 uppercase px-1">循序漸進練習區</div>
                <button onClick={() => startQuiz('1-80')} className="w-full flex items-center justify-between p-4 rounded-2xl text-blue-700 bg-blue-50 hover:bg-blue-100/80 transition-all border border-blue-100/60 font-semibold shadow-sm hover:shadow-md hover:translate-x-1 duration-200">
                  <span className="flex items-center"><Target className="mr-3 text-blue-500" size={20} /> 第 1 - 80 題</span>
                  <ArrowRight size={18} className="opacity-60" />
                </button>
                <button onClick={() => startQuiz('81-160')} className="w-full flex items-center justify-between p-4 rounded-2xl text-indigo-700 bg-indigo-50 hover:bg-indigo-100/80 transition-all border border-indigo-100/60 font-semibold shadow-sm hover:shadow-md hover:translate-x-1 duration-200">
                  <span className="flex items-center"><Target className="mr-3 text-indigo-500" size={20} /> 第 81 - 160 題</span>
                  <ArrowRight size={18} className="opacity-60" />
                </button>
                <button onClick={() => startQuiz('161-240')} className="w-full flex items-center justify-between p-4 rounded-2xl text-purple-700 bg-purple-50 hover:bg-purple-100/80 transition-all border border-purple-100/60 font-semibold shadow-sm hover:shadow-md hover:translate-x-1 duration-200">
                  <span className="flex items-center"><Target className="mr-3 text-purple-500" size={20} /> 第 161 - 240 題</span>
                  <ArrowRight size={18} className="opacity-60" />
                </button>
                
                <div className="my-4 border-t border-slate-100/80"></div>
                
                <div className="text-xs font-bold text-slate-400 tracking-wider mb-2 uppercase px-1">模擬實戰考驗區</div>
                <button onClick={() => startQuiz('rand80')} className="w-full flex items-center justify-between p-4 rounded-2xl text-orange-700 bg-orange-50 hover:bg-orange-100/80 transition-all border border-orange-100/60 font-semibold shadow-sm hover:shadow-md hover:translate-x-1 duration-200">
                  <span className="flex items-center"><Shuffle className="mr-3 text-orange-500" size={20} /> 隨機抽題 (80題)</span>
                  <ArrowRight size={18} className="opacity-60" />
                </button>
                <button onClick={() => startQuiz('rand240')} className="w-full flex items-center justify-between p-4 rounded-2xl text-rose-700 bg-rose-50 hover:bg-rose-100/80 transition-all border border-rose-100/60 font-semibold shadow-sm hover:shadow-md hover:translate-x-1 duration-200">
                  <span className="flex items-center"><Shuffle className="mr-3 text-rose-500" size={20} /> 綜合隨機 (240題)</span>
                  <ArrowRight size={18} className="opacity-60" />
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (mode === 'quiz') {
        const currentQ = quizConfig.questions[currentIndex];
        const progress = ((currentIndex + 1) / quizConfig.questions.length) * 100;

        return (
          <div className="min-h-screen bg-slate-50 flex flex-col font-sans antialiased">
            <div className="bg-white/80 backdrop-blur-md shadow-sm px-4 py-3 sticky top-0 z-10 border-b border-slate-200/60">
              <div className="max-w-3xl mx-auto flex justify-between items-center">
                <button onClick={() => setMode('menu')} className="text-slate-600 hover:text-slate-900 text-sm font-bold flex items-center bg-slate-100/80 active:scale-95 hover:bg-slate-200/80 px-3 py-1.5 rounded-xl transition-all">
                  <RotateCcw size={16} className="mr-1" /> 退出
                </button>
                <span className="font-extrabold text-slate-700 hidden sm:block max-w-[40%] truncate">{quizConfig.title}</span>
                <span className="font-bold bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full text-sm flex items-center shadow-sm">
                  <Award size={16} className="mr-1 text-emerald-600" /> 得分: {score}
                </span>
              </div>
            </div>

            <div className="w-full h-1.5 bg-slate-100">
              <div className="h-full bg-gradient-to-r from-blue-500 to-indigo-600 transition-all duration-300 ease-out shadow-inner" style={{width: `${progress}%`}}></div>
            </div>

            <div className="flex-1 w-full max-w-3xl mx-auto p-5 md:p-8 flex flex-col pb-24">
              <div className="mb-6">
                <div className="text-xs font-black text-blue-600 mb-3 tracking-wider bg-blue-50/80 border border-blue-100/60 inline-block px-3 py-1 rounded-full">
                  QUESTION {currentIndex + 1} / {quizConfig.questions.length}
                </div>
                <h2 className="text-xl md:text-2xl font-extrabold text-slate-800 leading-relaxed">
                  <span className="text-slate-400 font-mono mr-2">{currentQ.id}.</span>{currentQ.q}
                </h2>
              </div>

              <div className="space-y-3 mt-2">
                {currentQ.opts.map((opt, idx) => {
                  const isCorrectAns = idx === currentQ.ans;
                  const isSelectedAns = idx === selectedOption;
                  
                  let btnClass = "w-full text-left p-4 md:p-5 rounded-2xl border-2 font-semibold flex items-center transition-all duration-200 ";
                  
                  if (!isAnswered) {
                    btnClass += "border-slate-200/80 bg-white text-slate-700 hover:border-blue-300 hover:bg-blue-50/50 hover:shadow-sm cursor-pointer active:scale-[0.99]";
                  } else {
                    btnClass += " cursor-default";
                    if (isCorrectAns) {
                      btnClass += " border-emerald-500 bg-emerald-50 text-emerald-800 shadow-sm transform scale-[1.01]"; 
                    } else if (isSelectedAns) {
                      btnClass += " border-rose-500 bg-rose-50 text-rose-800"; 
                    } else {
                      btnClass += " border-slate-100 bg-slate-100/30 text-slate-400 opacity-60";
                    }
                  }

                  return (
                    <button 
                      key={idx} 
                      onClick={() => handleOptionClick(idx)} 
                      className={btnClass} 
                      disabled={isAnswered}
                    >
                      <div className={`flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full mr-4 text-sm font-black transition-colors duration-250
                        ${!isAnswered ? 'bg-slate-100 text-slate-600 group-hover:bg-blue-100' : 
                          isCorrectAns ? 'bg-emerald-200 text-emerald-800' : 
                          isSelectedAns ? 'bg-rose-200 text-rose-800' : 'bg-slate-100 text-slate-400'}`}>
                        {['A', 'B', 'C', 'D'][idx]}
                      </div>
                      <span className="leading-snug flex-1 font-medium text-[0.95rem] md:text-base">{opt}</span>
                      
                      {isAnswered && isCorrectAns && <CheckCircle2 size={24} className="text-emerald-500 ml-2 flex-shrink-0" />}
                      {isAnswered && isSelectedAns && !isCorrectAns && <XCircle size={24} className="text-rose-500 ml-2 flex-shrink-0" />}
                    </button>
                  )
                })}
              </div>

              {isAnswered && (
                <div className="mt-8 flex justify-end">
                  <button
                    onClick={handleNextQuestion}
                    className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-bold flex items-center transition shadow-lg hover:shadow-xl transform active:scale-95 hover:-translate-y-0.5 duration-150"
                  >
                    {currentIndex + 1 < quizConfig.questions.length ? (
                      <>下一題 <ArrowRight size={20} className="ml-2" /></>
                    ) : (
                      <>查看成績 <Award size={20} className="ml-2" /></>
                    )}
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      }

      if (mode === 'result') {
        const accuracy = Math.round((score / quizConfig.questions.length) * 100) || 0;
        
        return (
          <div className="min-h-screen bg-slate-50 p-4 md:p-8 flex justify-center items-start pt-10 font-sans antialiased">
            <div className="bg-white rounded-3xl shadow-xl w-full max-w-2xl p-6 md:p-10 border border-slate-100">
              <div className="text-center mb-8">
                <h2 className="text-3xl font-black text-slate-800 mb-2">測驗完成！</h2>
                <p className="text-slate-500 font-bold">{quizConfig.title}</p>
                
                <div className="mt-8 mb-6 flex justify-center">
                  <div className="relative w-40 h-40 bg-gradient-to-tr from-blue-50/50 to-indigo-50 rounded-full flex flex-col items-center justify-center border-8 border-blue-50 shadow-inner">
                    <span className="text-5xl font-black text-blue-600">{score}</span>
                    <span className="text-sm font-bold text-blue-400 mt-1">/ {quizConfig.questions.length} 題</span>
                  </div>
                </div>
                <div className="inline-block bg-slate-50 px-6 py-2.5 rounded-full border border-slate-100">
                  <p className="text-base font-bold text-slate-700">總答對率: <span className={`font-black ${accuracy >= 80 ? "text-emerald-600" : accuracy >= 60 ? "text-orange-500" : "text-rose-500"}`}>{accuracy}%</span></p>
                </div>
              </div>

              {wrongAnswers.length > 0 ? (
                <div className="mb-8">
                  <div className="flex items-center justify-center mb-6 pb-4 border-b border-slate-100">
                    <span className="text-xl mr-2">📝</span>
                    <h3 className="text-lg font-black text-slate-800">錯題總複習 ({wrongAnswers.length} 題)</h3>
                  </div>
                  <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                    {wrongAnswers.map((item, i) => (
                      <div key={i} className="bg-slate-50/40 p-5 md:p-6 rounded-2xl border border-slate-200/60">
                        <p className="font-extrabold text-slate-800 mb-4 leading-relaxed">
                          <span className="text-rose-500 font-mono mr-1.5">[ 題目 {item.q.id} ]</span> {item.q.q}
                        </p>
                        <div className="space-y-2">
                          <div className="flex items-start text-sm text-rose-800 bg-rose-50/80 px-4 py-3 rounded-xl font-semibold border border-rose-100">
                            <XCircle size={18} className="mr-2 mt-0.5 flex-shrink-0 text-rose-500" />
                            <span>您的答案: {item.q.opts[item.selected]}</span>
                          </div>
                          <div className="flex items-start text-sm text-emerald-800 bg-emerald-50/80 px-4 py-3 rounded-xl font-extrabold border border-emerald-100 shadow-sm">
                            <CheckCircle2 size={18} className="mr-2 mt-0.5 flex-shrink-0 text-emerald-600" />
                            <span>正確答案: {item.q.opts[item.q.ans]}</span>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="text-center mb-8 p-8 bg-emerald-50/50 rounded-3xl border border-emerald-100">
                  <div className="text-5xl mb-4 flex justify-center">
                    <Award className="text-emerald-500 animate-bounce" size={64} />
                  </div>
                  <h3 className="text-2xl font-black text-emerald-800">太棒了！全數答對！</h3>
                  <p className="text-emerald-600 mt-2 font-bold">您已經完美掌握這個範圍的所有學理知識！</p>
                </div>
              )}

              <button onClick={() => setMode('menu')} className="w-full flex items-center justify-center bg-slate-900 hover:bg-slate-800 text-white font-extrabold py-4 px-4 rounded-2xl transition shadow-lg text-lg tracking-wide group active:scale-[0.99] duration-150">
                <RotateCcw className="mr-2 group-hover:-rotate-180 transition-transform duration-500" size={20} />
                返回主選單
              </button>
            </div>
          </div>
        );
      }

      return null;
    }

    // 啟動 React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
